name: "🐛 Сообщение об ошибке / Bug report"
description: "Сообщите о вылете игры, баге в сборке Ultimate Optimization или конфликте модов"
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### 📌 Пожалуйста, заполните форму ниже для исправления ошибки в Ultimate Optimization.
  - type: textarea
    id: description
    attributes:
      label: "Описание проблемы"
      description: "Что конкретно произошло? Опишите ваши действия перед вылетом."
      placeholder: "Игра вылетает при открытии инвентаря или заходе в мир..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Версия сборки и Майнкрафта"
      placeholder: "Например: v1.0.0 (Minecraft 1.21)"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Логи ошибки (latest.log или crash-report)"
      description: "Перетащите файл лога сюда или скопируйте его содержимое. Без логов мы не сможем вам помочь!"
      placeholder: "Вставьте текст ошибки из папки crash-reports или лог вашей игры..."
    validations:
      required: true
