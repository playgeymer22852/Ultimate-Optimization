name: "🧩 Запрос нового мода / Mod request"
description: "Предложить новый оптимизационный мод для добавления в сборку."
labels: ["mod"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🔗 Предложение новой модификации
        Перед отправкой запроса, пожалуйста, [убедитесь через поиск](https://github.com), что этот мод ещё не предлагался кем-то другим ранее.
        Помните главное техническое правило нашей сборки: чем меньше лишнего контента, тем лучше общая производительность игры.

  - type: input
    id: mod_name
    attributes:
      label: "🏷️ Название мода / Mod name"
      description: "Укажите официальное название модификации."
      placeholder: "Например: Bobby, Sodium Extra, Lithium..."
    validations:
      required: true

  - type: input
    id: modrinth_link
    attributes:
      label: "🟢 Ссылка на Modrinth"
      description: "Укажите прямую ссылку на страницу модификации на платформе Modrinth."
      placeholder: "https://modrinth.com/mod/..."
    validations:
      required: true

  - type: input
    id: source_link
    attributes:
      label: "💻 Ссылка на исходный код (GitHub)"
      description: "Укажите ссылку на официальный репозиторий проекта на GitHub (если есть)."
      placeholder: "https://github.com/..."
    validations:
      required: false

  - type: input
    id: file_size
    attributes:
      label: "⚖️ Размер файла мода"
      description: "Укажите примерный вес файла `.jar` с сайта Modrinth. Напишите 'неизвестно', если публичных версий еще нет."
      placeholder: "Например: 150 KB, 2.5 MB"
    validations:
      required: true

  - type: dropdown
    id: license
    attributes:
      label: "📜 Лицензия мода"
      description: "Какая лицензия указана в боковом меню страницы мода на Modrinth?"
      options:
        - "Открытая (MIT / Apache / GPL / BSD)"
        - "Все права защищены (All Rights Reserved / ARR)"
        - "Кастомная лицензия (Custom)"
        - "Неизвестно"
    validations:
      required: true

  - type: textarea
    id: what_it_does
    attributes:
      label: "❓ Что делает этот мод? / What it does"
      description: "Дайте короткое описание основных функций этой модификации."
      placeholder: "Например: Этот мод оптимизирует физику мобов и генерацию шумов мира..."
    validations:
      required: true

  - type: textarea
    id: why_in_pack
    attributes:
      label: "➕ Почему он ДОЛЖЕН быть в сборке?"
      description: "Какую конкретную пользу он принесет игрокам, сохраняя при этом классический ванильный баланс игры?"
      placeholder: "Например: Он полностью убирает микрофризы при открытии инвентаря на серверах..."
    validations:
      required: true

  - type: textarea
    id: why_not_in_pack
    attributes:
      label: "➖ Почему он НЕ ДОЛЖЕН быть в сборке? (Минусы)"
      description: "У каждого мода есть недостатки. Опишите возможные минусы (баги, долгая загрузка, конфликты с Sodium/Lithium)."
      placeholder: "Примеры: мод всё еще в бете, ломает кастомные шейдеры, имеет слишком запутанное меню настроек..."
    validations:
      required: true
    
  - type: textarea
    id: additional
    attributes:
      label: "📌 Дополнительные детали"
      description: "Всё, что вы хотите добавить от себя (необязательно)."
    validations:
      required: false
