name: "🪲 Сообщение об ошибке / Bug report"
description: "Сообщить о технической проблеме, плохом FPS или вылете в чистой версии сборки."
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🪲 Отчёт о технической ошибке
        Перед тем как сообщить о баге, пожалуйста, [убедитесь через поиск](https://github.com), что аналогичная техническая проблема не обсуждалась и не была зарегистрирована кем-то другим ранее.

  - type: textarea
    id: bug_description
    attributes:
      label: "📋 Описание ошибки"
      description: "Подробно и понятно опишите вашу проблему. Что именно пошло не так в игре?"
      placeholder: "Например: Игра вылетает при попытке зайти в измерение Незер..."
    validations:
      required: true

  - type: input
    id: modpack_version
    attributes:
      label: "📊 Версия сборки / Modpack version"
      description: "Какую именно версию нашего модпака Ultimate Fabric Optimization вы используете?"
      placeholder: "Её можно найти в правом нижнем углу главного меню игры."
    validations:
      required: true

  - type: dropdown
    id: launcher_choice
    attributes:
      label: "🎮 Выбор лаунчера"
      description: "Через какой лаунчер вы запускаете нашу сборку?"
      options:
        - "Modrinth App"
        - "Prism Launcher"
        - "MultiMC"
        - "Официальный лаунчер Minecraft (Vanilla)"
        - "Другой сторонний лаунчер"
    validations:
      required: true

  - type: textarea
    id: extra_context
    attributes:
      label: "💡 Дополнительный контекст и логи краша"
      description: "Прикрепите скриншоты или видео. Если у вас произошёл вылет (краш), пожалуйста, загрузите ваш файл лога на сайт [mclo.gs](https://mclo.gs/) и вставьте ссылку на него сюда."
      placeholder: |
        Подсказка: Вы можете легко прикреплять скриншоты или файлы логов, просто перетащив их мышкой прямо в это текстовое поле со своего компьютера.
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: "🛡️ Проверка соглашения"
      options:
        - label: "Этот отчёт касается исключительно чистой версии модпака Ultimate Fabric Optimization. Я не изменял список модов вручную и не устанавливал сторонние тяжёлые ресурс-паки перед вылетом."
          required: true
